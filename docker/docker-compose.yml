services:
  challenge:
    image: gemma4-challenge:latest
    build:
      context: .
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0,1
    volumes:
      - /mnt/hdd2/google/gemma-3n-e2B:/models/gemma4-2b:ro
      - ../data:/data
      - ../solution:/solution
      - ../judge:/judge
      - ../baseline:/baseline
    shm_size: "16g"
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace
