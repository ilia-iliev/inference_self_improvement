services:
  challenge:
    image: gemma4-challenge:latest
    build:
      context: .
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0,1
    volumes:
      - /mnt/hdd2/google/gemma-3n-e2B:/models/gemma4-2b:ro
      - ../data:/data
      - ../solution:/solution
      - ../judge:/judge
      - ../baseline:/baseline
    shm_size: "16g"
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace

  # One-shot: generate synthetic multimodal assets + prompt sets
  generate-data:
    extends: challenge
    command: python3 /data/generate_prompts.py

  # One-shot: generate HF greedy reference outputs for dev + eval sets
  generate-references:
    extends: challenge
    command: python3 /baseline/generate_reference.py

  # One-shot: run vLLM baseline, record timing
  run-baseline:
    extends: challenge
    command: python3 /baseline/run_vllm_baseline.py

  # One-shot: run the agent's solution
  run-solution:
    extends: challenge
    command: python3 /solution/run.py /judge/eval_prompts.jsonl

  # One-shot: judge the agent's solution
  judge:
    extends: challenge
    command: python3 /judge/judge.py
