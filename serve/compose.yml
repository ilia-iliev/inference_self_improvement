# Local LLM endpoint for the agent runner. Exposes an OpenAI-compatible API
# on host :8001. Pins GPU0 by default (overridable via AGENT_LLM_GPU)

services:
  agent-llm:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: gemma4-agent-llm
    ipc: host
    restart: unless-stopped
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      # Prefer the host-injected libcuda
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/local/cuda/lib64
    volumes:
      - /mnt/hdd2:/mnt/hdd2:ro
    ports:
      - "${AGENT_LLM_PORT:-8001}:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${AGENT_LLM_GPU:-0}"]
              capabilities: [gpu]
    command:
      - --model=${AGENT_LLM_MODEL:-google/gemma-4-e4b-it}
      - --enable-auto-tool-choice
      - --tool-call-parser=${AGENT_LLM_TOOL_PARSER:-hermes}
      - --max-model-len=${AGENT_LLM_MAX_LEN:-65536}
